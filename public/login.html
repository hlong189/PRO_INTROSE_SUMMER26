<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập | NT-II</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  primary: '#7c5454', 'on-primary': '#ffffff', 'primary-container': '#d4a3a3',
  secondary: '#675c56', 'secondary-container': '#ecddd4',
  background: '#f9f9f9', surface: '#ffffff', 'on-surface': '#1a1c1c', 'on-surface-variant': '#504444',
  outline: '#827473', 'outline-variant': '#d4c2c2', error: '#ba1a1a',
}, fontFamily: { display: ['Playfair Display','serif'], sans: ['Hanken Grotesk','sans-serif'] } } } };
</script>
<link rel="stylesheet" href="/css/styles.css"/>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/index.html" class="font-display text-3xl font-semibold text-primary">NT-II</a>
      <p class="text-on-surface-variant mt-2 text-sm">Skincare khoa học, vẻ đẹp tinh tế</p>
    </div>
    <div class="card p-8 md:p-10">
      <h1 class="font-display text-2xl font-medium mb-1">Đăng nhập</h1>
      <p class="text-sm text-on-surface-variant mb-6">Chào mừng bạn trở lại NT-II</p>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="text-label-caps text-on-surface-variant">Email</label>
          <input type="email" id="email" required class="input-field" placeholder="ban@email.com"/>
        </div>
        <div>
          <label class="text-label-caps text-on-surface-variant">Mật khẩu</label>
          <input type="password" id="password" required class="input-field" placeholder="••••••••"/>
        </div>
        <div class="flex justify-end">
          <a href="/forgot-password.html" class="text-sm text-primary font-medium">Quên mật khẩu?</a>
        </div>
        <p id="error-msg" class="text-error text-sm hidden"></p>
        <button type="submit" id="submit-btn" class="btn-primary w-full uppercase">Đăng nhập</button>
      </form>

      <div class="my-6 text-center text-xs text-on-surface-variant">hoặc dùng tài khoản demo</div>
      <div class="grid grid-cols-2 gap-2 text-xs">
        <button onclick="fillDemo('admin@ntii.vn','admin123')" class="btn-ghost py-2 px-1">Demo Admin</button>
        <button onclick="fillDemo('customer@ntii.vn','customer123')" class="btn-ghost py-2 px-1">Demo Khách</button>
      </div>

      <p class="text-center text-sm text-on-surface-variant mt-8">
        Chưa có tài khoản? <a href="/register.html" class="text-primary font-semibold">Đăng ký ngay</a>
      </p>
    </div>
  </div>

<script src="/js/api.js"></script>
<script>
function fillDemo(email, pass) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = pass;
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('submit-btn');
  errEl.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
  try {
    const data = await api('/auth/login', {
      method: 'POST',
      auth: false,
      body: { email: document.getElementById('email').value, password: document.getElementById('password').value },
    });
    Auth.setToken(data.token);
    Auth.setUser(data.user);
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next');
    window.location.href = next || data.redirect || '/index.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Đăng nhập';
  }
});
</script>
</body>
</html>
