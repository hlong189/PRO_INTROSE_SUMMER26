const SKIN_TYPE_LABEL = { Oily: 'Da dầu', Dry: 'Da khô', Combination: 'Da hỗn hợp', Sensitive: 'Da nhạy cảm' };

async function load() {
  try {
    const me = await api('/profile');
    document.getElementById('full_name').value = me.full_name || '';
    document.getElementById('email').value = me.email || '';
    document.getElementById('phone').value = me.phone || '';
    document.getElementById('recipient_name').value = me.recipient_name || '';
    document.getElementById('recipient_phone').value = me.recipient_phone || '';
    document.getElementById('province_city').value = me.province_city || '';
    document.getElementById('ward').value = me.ward || '';
    document.getElementById('specific_address').value = me.specific_address || '';
    document.getElementById('membership-badge').textContent = `${me.membership_level} · ${me.accumulated_points} điểm`;

    if (me.skin_profile) {
      document.getElementById('skin-profile-view').innerHTML = `
        <p><strong class="text-on-surface">Loại da:</strong> ${SKIN_TYPE_LABEL[me.skin_profile.skin_type] || me.skin_profile.skin_type}</p>
        ${me.skin_profile.primary_concern ? `<p><strong class="text-on-surface">Vấn đề quan tâm:</strong> ${me.skin_profile.primary_concern}</p>` : ''}
        ${me.skin_profile.allergy_ingredients ? `<p><strong class="text-on-surface">Dị ứng:</strong> ${me.skin_profile.allergy_ingredients}</p>` : ''}`;
    }
  } catch (err) { showToast(err.message, 'error'); }
}
load();
