<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký | NT-II</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  primary: '#7c5454', 'on-primary': '#ffffff', 'primary-container': '#d4a3a3',
  secondary: '#675c56', 'secondary-container': '#ecddd4',
  background: '#f9f9f9', surface: '#ffffff', 'on-surface': '#1a1c1c', 'on-surface-variant': '#504444',
  outline: '#827473', 'outline-variant': '#d4c2c2', error: '#ba1a1a',
}, fontFamily: { display: ['Playfair Display','serif'], sans: ['Hanken Grotesk','sans-serif'] } } } };
</script>
<link rel="stylesheet" href="/css/styles.css"/>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/index.html" class="font-display text-3xl font-semibold text-primary">NT-II</a>
      <p class="text-on-surface-variant mt-2 text-sm">Tạo tài khoản để khám phá làn da của bạn</p>
    </div>
    <div class="card p-8 md:p-10">
      <h1 class="font-display text-2xl font-medium mb-1">Đăng ký tài khoản</h1>
      <p class="text-sm text-on-surface-variant mb-6">Chỉ mất chưa đến 1 phút</p>

      <form id="register-form" class="space-y-5">
        <div>
          <label class="text-label-caps text-on-surface-variant">Họ và tên</label>
          <input type="text" id="full_name" required class="input-field" placeholder="Nguyễn Văn A"/>
        </div>
        <div>
          <label class="text-label-caps text-on-surface-variant">Email</label>
          <input type="email" id="email" required class="input-field" placeholder="ban@email.com"/>
        </div>
        <div>
          <label class="text-label-caps text-on-surface-variant">Số điện thoại</label>
          <input type="tel" id="phone" class="input-field" placeholder="09xxxxxxxx"/>
        </div>
        <div>
          <label class="text-label-caps text-on-surface-variant">Mật khẩu</label>
          <input type="password" id="password" required minlength="6" class="input-field" placeholder="Tối thiểu 6 ký tự"/>
        </div>
        <p id="error-msg" class="text-error text-sm hidden"></p>
        <button type="submit" id="submit-btn" class="btn-primary w-full uppercase">Đăng ký</button>
      </form>

      <p class="text-center text-sm text-on-surface-variant mt-8">
        Đã có tài khoản? <a href="/login.html" class="text-primary font-semibold">Đăng nhập</a>
      </p>
    </div>
  </div>

<script src="/js/api.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('submit-btn');
  errEl.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Đang xử lý...';
  try {
    await api('/auth/register', {
      method: 'POST',
      auth: false,
      body: {
        full_name: document.getElementById('full_name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
      },
    });
    // Sau khi đăng ký thành công -> điều hướng về màn hình Đăng nhập
    window.location.href = '/login.html?registered=1';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Đăng ký';
  }
});
</script>
</body>
</html>
